<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法律咨询宝典 AI</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  scroll-behavior: smooth;
}
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #111827;
  color: #f3f4f6;
  line-height: 1.7;
  transition: background 0.3s, color 0.3s;
}
body.light {
  background: #f9fafb;
  color: #111827;
}

/* 导航 */
nav {
  background: rgba(17,24,39,0.95);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 99;
  border-bottom: 1px solid #374151;
}
body.light nav {
  background: rgba(255,255,255,0.95);
  border-bottom: 1px solid #e5e7eb;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 16px;
}
.nav-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 60px;
}
.logo {
  font-size: 18px;
  font-weight: bold;
  color: #4f46e5;
}
#themeToggle {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: inherit;
}

/* 标题区 */
.header {
  text-align: center;
  padding: 40px 0 20px;
}
.header h1 {
  font-size: 26px;
  margin-bottom: 10px;
  color: #4f46e5;
}
.header p {
  opacity: 0.8;
}

/* 聊天区域 */
.chat-box {
  background: #1f2937;
  border-radius: 16px;
  padding: 20px;
  height: 500px;
  overflow-y: auto;
  margin-bottom: 20px;
  border: 1px solid #374151;
}
body.light .chat-box {
  background: #fff;
  border-color: #e5e7eb;
}
.msg {
  margin: 10px 0;
  padding: 12px 16px;
  border-radius: 12px;
  max-width: 85%;
}
.bot {
  background: #374151;
  margin-right: auto;
}
body.light .bot {
  background: #f3f4f6;
}
.user {
  background: #4f46e5;
  margin-left: auto;
  color: #fff;
}

/* 输入框 */
.chat-input {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}
.chat-input input {
  flex: 1;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid #374151;
  background: #1f2937;
  color: #fff;
  font-size: 16px;
}
body.light .chat-input input {
  background: #fff;
  color: #111;
  border-color: #d1d5db;
}
.chat-input button {
  padding: 0 20px;
  border-radius: 12px;
  background: #4f46e5;
  color: #fff;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* 回到顶部 */
#toTop {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  background: #4f46e5;
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#toTop.show {
  opacity: 1;
  pointer-events: auto;
}

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 3px; }
</style>
</head>

<body>

<nav>
  <div class="container">
    <div class="nav-inner">
      <div class="logo">法律咨询宝典 AI</div>
      <button id="themeToggle">🌙</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>法律咨询宝典</h1>
    <p>提供基础法律知识问答，非专业律师意见，仅供参考</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg bot">你好！我是法律咨询 AI，你可以问我：<br>
    • 劳动合同<br>
    • 民间借贷<br>
    • 交通事故<br>
    • 婚姻家庭<br>
    • 消费者权益<br>
    • 治安与刑法常识<br>
    我会为你提供基础法律解答。
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="请输入你的法律问题…">
    <button onclick="sendAsk()">发送</button>
  </div>
</div>

<div id="toTop" onclick="toTop()">↑</div>

<script>
// 主题切换
const themeBtn = document.getElementById('themeToggle')
themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('light')
  themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙'
})

// 回到顶部
window.addEventListener('scroll', () => {
  document.getElementById('toTop').classList.toggle('show', window.scrollY > 300)
})
function toTop() {
  window.scrollTo(0, 0)
}

// 法律 AI 问答
function sendAsk() {
  const i = document.getElementById('chatInput')
  const q = i.value.trim()
  if (!q) return
  const box = document.getElementById('chatBox')
  box.innerHTML += `<div class="msg user">${q}</div>`
  i.value = ''

  let a = "我已收到你的问题，但该内容需要更专业的法律意见，请咨询执业律师。本机器人仅提供基础普法参考。"

  // ========== 劳动法 ==========
  if (/试用期|辞职|离职|被辞退|解雇|劳动合同/.test(q))
    a=`【劳动合同】
1. 试用期最长不超过 6 个月，工资不低于正式工资 80%。
2. 提前 30 天书面通知可离职，试用期提前 3 天。
3. 无故辞退可主张赔偿金（2N）或经济补偿金（N）。
4. 不签劳动合同，超过 1 个月可主张双倍工资。`

  if (/加班|加班费|双休|法定假日/.test(q))
    a=`【加班与工资】
• 工作日加班：1.5 倍工资
• 休息日加班：2 倍工资（不能调休时）
• 法定节假日：3 倍工资
每月加班一般不超过 36 小时。`

  // ========== 民间借贷 ==========
  if (/借钱|欠条|借条|利息|高利贷|不还钱/.test(q))
    a=`【民间借贷】
1. 借条要写：金额、日期、借款人身份证、还款时间、签字。
2. 年利率未超过合同成立时 LPR 4 倍受法律保护。
3. 超过部分法律一般不支持。
4. 对方不还可起诉，注意 3 年诉讼时效。`

  // ========== 婚姻家庭 ==========
  if (/离婚|抚养权|彩礼|共同财产|结婚/.test(q))
    a=`【婚姻家庭】
• 离婚方式：协议离婚 / 诉讼离婚
• 抚养权：一般按最有利于未成年子女原则判决
• 彩礼：未结婚、未共同生活等可主张返还
• 婚后工资、房产一般属夫妻共同财产`

  // ========== 交通事故 ==========
  if (/交通事故|撞车|赔偿|责任认定|保险/.test(q))
    a=`【交通事故】
1. 先报警定责，保留现场、照片、视频。
2. 赔偿包括：医疗费、误工费、护理费、交通费等。
3. 交强险优先赔付，不足部分按责任比例分担。
4. 切勿逃逸，逃逸通常全责且可能涉嫌犯罪。`

  // ========== 消费者权益 ==========
  if (/假货|退款|退货|欺诈|网购|商家不退款/.test(q))
    a=`【消费者权益】
• 商品有质量问题可要求退货、退款、更换。
• 网购商品一般 7 天无理由退货（特殊商品除外）。
• 商家欺诈可主张“退一赔三”，最低 500 元。
• 可投诉至 12315。`

  // ========== 治安 / 刑法基础 ==========
  if (/打架|轻伤|诈骗|盗窃|拘留|坐牢/.test(q))
    a=`【治安与刑事】
• 打架可能构成故意伤害，轻伤以上可入刑。
• 盗窃、诈骗达到一定金额构成犯罪。
• 行政拘留一般 1～15 天，刑事拘留可能面临判刑。
• 遇到案件建议立即报警并委托律师。`

  // ========== 租房 ==========
  if (/租房|房东|押金|不退押金|转租/.test(q))
    a=`【房屋租赁】
1. 押金应在退房无损坏时退还。
2. 房东无故不退押金可起诉或投诉。
3. 转租一般需房东同意。
4. 合同要写清租金、期限、维修责任。`

  // ========== 通用提示 ==========
  a += "\n\n⚠️ 提示：本回答为基础普法，不构成正式法律意见，具体案件请咨询律师。"

  setTimeout(() => {
    box.innerHTML += `<div class="msg bot">${a}</div>`
    box.scrollTop = box.scrollHeight
  }, 500)
}
</script>

</body>
</html>
